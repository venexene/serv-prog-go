{{define "footer"}}
<footer class="bg-swamp-900 text-white">
    <script>
        document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("subscribe-form");
        let messageBox = document.getElementById("subscribe-message");

        if (!form) return;

        if (!messageBox) {
            messageBox = document.createElement('div');
            messageBox.id = 'subscribe-message';
            messageBox.className = 'mt-2 text-sm';
            messageBox.setAttribute('aria-live', 'polite');
            form.insertAdjacentElement('afterend', messageBox);
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const email = formData.get("email");

            if (!email) {
            messageBox.textContent = "Please enter your email.";
            messageBox.style.color = "red";
            return;
            }

            messageBox.textContent = "Sending...";
            messageBox.style.color = "";

            try {
            // include CSRF token from form hidden field for AJAX POSTs
            const token = formData.get('gorilla.csrf.Token') || document.querySelector('input[name="gorilla.csrf.Token"]')?.value;
            const headers = token ? { 'X-CSRF-Token': token } : {};
            const response = await fetch("/api/subscribe", {
                method: "POST",
                headers,
                body: formData,
            });

            const data = await response.json();

            if (response.ok && data.status === "ok") {
                messageBox.textContent = data.message || "Subscribed successfully!";
                messageBox.style.color = "white";
                form.reset();
            } else {
                messageBox.textContent = data.message || "Subscription failed.";
                messageBox.style.color = "red";
            }
            } catch (err) {
            messageBox.textContent = "Network error. Please try again.";
            messageBox.style.color = "red";
            }
        });
        });
    </script>

    <div class="max-w-7xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div>
                <div class="flex items-center space-x-2">
                    <img src="static/green-toad-logo.svg" alt="Greenswamp Logo" class="h-8 w-8">
                    <span class="text-xl font-bold">Greenswamp</span>
                </div>
                <p class="mt-4 text-sm text-swamp-300">
                    Connecting people one ribbit at a time.
                </p>
            </div>
            <div class="grid grid-cols-2 gap-8">
                <div>
                    <h4 class="text-sm font-semibold">Company</h4>
                    <ul class="mt-4 space-y-2 text-sm">
                        <li><a href="/about" class="text-swamp-300 hover:text-white">About</a></li>
                        <li><a href="/contact" class="text-swamp-300 hover:text-white">Contact</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-sm font-semibold">Legal</h4>
                    <ul class="mt-4 space-y-2 text-sm">
                        <li><a href="/privacy" class="text-swamp-300 hover:text-white">Privacy</a></li>
                        <li><a href="/tos" class="text-swamp-300 hover:text-white">Terms</a></li>
                    </ul>
                </div>
            </div>
            <div>
                <h4 class="text-sm font-semibold">Stay Updated</h4>
                <form id="subscribe-form" class="mt-4 flex" action="/api/subscribe" method="POST">
                    {{ .CSRFField }}
                    <input name="email" type="email" required placeholder="Enter your email"
                           class="px-4 py-2 rounded-l-full flex-1 text-swamp-900">
                    <button type="submit" class="bg-swamp-500 px-6 py-2 rounded-r-full hover:bg-swamp-600">Subscribe</button>
                </form>
                <div id="subscribe-message" class="mt-2 text-sm" aria-live="polite"></div>
            </div>
        </div>
    </div>
</footer>
{{end}}
