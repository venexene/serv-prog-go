{{define "login.html"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Greenswamp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            swamp: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-swamp-50 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="text-center mb-16">
      <div class="flex items-center justify-center space-x-3 mb-6">
        <span class="text-4xl font-bold text-swamp-900">Greenswamp</span>
      </div>
      <p class="text-lg text-swamp-800">Welcome back to the pond</p>
    </div>

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-8 sm:p-12 border border-swamp-100">
      {{if .Error}}
      <div class="mb-6 rounded-2xl border border-red-200 bg-red-50 p-4 text-sm text-red-700">
        {{.Error}}
      </div>
      {{end}}

      <form class="space-y-6" method="POST" action="/login?next={{.Next}}">
        {{.CSRFField}}
        <input type="hidden" name="next" value="{{.Next}}">

        <div class="space-y-2">
          <label class="block text-base font-semibold text-swamp-900">Email or username</label>
          <input name="login" value="{{.Login}}" required
            class="mt-1 block w-full rounded-xl bg-white px-5 py-3.5
                   border border-swamp-200 focus:border-swamp-400
                   focus:ring-2 focus:ring-swamp-200 placeholder-slate-400
                   text-slate-900 shadow-sm"
            placeholder="you@example.com">
        </div>

        <div class="space-y-2">
          <label class="block text-base font-semibold text-swamp-900">Password</label>
          <input type="password" name="password" required
            class="mt-1 block w-full rounded-xl bg-white px-5 py-3.5
                   border border-swamp-200 focus:border-swamp-400
                   focus:ring-2 focus:ring-swamp-200 placeholder-slate-400
                   text-slate-900 shadow-sm"
            placeholder="••••••••">
        </div>

        <!-- TODO: "Remember me" checkbox and "Forgot password?" link not yet supported by backend -->
        <div class="flex items-center justify-between">
          <label class="flex items-center space-x-2 text-swamp-700">
            <input type="checkbox" class="rounded border-swamp-300 text-swamp-600 focus:ring-swamp-400" disabled>
            <span class="text-sm">Remember me</span>
          </label>
          <span class="text-swamp-500 text-sm cursor-not-allowed">Forgot password?</span>
        </div>

        <button type="submit"
          class="w-full bg-gradient-to-br from-swamp-500 to-swamp-600 text-white
                 py-4 px-6 rounded-xl hover:from-swamp-600 hover:to-swamp-700
                 focus:ring-2 focus:ring-swamp-400 font-semibold
                 transition-all duration-200 shadow-lg">
          Log In
        </button>

        <p class="text-center text-swamp-700 mt-8">
          New to Greenswamp?
          <a href="/register?next={{.Next}}" class="font-semibold text-swamp-800 hover:text-swamp-900 underline">
            Create account
          </a>
        </p>
      </form>
    </div>

    <div class="mt-16 text-center">
      <div class="flex items-center justify-center space-x-4 text-swamp-700">
        <a href="/privacy" class="hover:text-swamp-900 hover:underline">Privacy</a>
        <span class="text-swamp-500">•</span>
        <a href="/tos" class="hover:text-swamp-900 hover:underline">Terms</a>
        <span class="text-swamp-500">•</span>
        <a href="/contact" class="hover:text-swamp-900 hover:underline">Contact</a>
      </div>
    </div>
  </div>
</body>
</html>
{{end}}
