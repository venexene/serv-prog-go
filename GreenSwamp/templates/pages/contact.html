<!DOCTYPE html>
<html lang="en">
{{template "head" .}}
<body class="bg-swamp-50 text-slate-800">
{{template "nav" .}}

<!-- Main Content -->
<section class="rounded-xl shadow-sm p-8">
    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-swamp-900 mb-2">
                Swamp Mail
            </h2>
            <p class="text-swamp-700">Send a message that'll hop straight to our team</p>
        </div>

        <form id="contactForm" class="space-y-6" method="POST" action="/api/contact">
            {{ .CSRFField }}
            <!-- Name Field -->
            <div>
                <label class="block text-sm font-medium text-swamp-700 mb-1">
                    Your Name
                </label>
                <input name="name" type="text"
                       required
                       class="w-full px-4 py-2 border border-swamp-200 rounded-lg focus:ring-2 focus:ring-swamp-400 focus:border-transparent"
                       placeholder="Viggo The Frogger">
            </div>

            <!-- Email Field -->
            <div>
                <label class="block text-sm font-medium text-swamp-700 mb-1">
                    Your Email
                </label>
                  <input name="email" type="email"
                      required
                      class="w-full px-4 py-2 border border-swamp-200 rounded-lg focus:ring-2 focus:ring-swamp-400 focus:border-transparent"
                      placeholder="croak@swamp.edu">
            </div>

            <!-- Subject Field -->
            <div>
                <label class="block text-sm font-medium text-swamp-700 mb-1">
                    Message Topic
                </label>
                <select name="topic" class="w-full px-4 py-2 border border-swamp-200 rounded-lg focus:ring-2 focus:ring-swamp-400 focus:border-transparent">
                    <option>General Question</option>
                    <option>Bug Report</option>
                    <option>Feature Request</option>
                    <option>Partnership</option>
                </select>
            </div>

            <!-- Message Field -->
            <div>
                <label class="block text-sm font-medium text-swamp-700 mb-1">
                    Your Message
                </label>
                <textarea name="message"
                    rows="5"
                    required
                    class="w-full px-4 py-2 border border-swamp-200 rounded-lg focus:ring-2 focus:ring-swamp-400 focus:border-transparent"
                    placeholder="Type your message here..."></textarea>
            </div>

            <!-- Submit Button -->
            <div class="text-center">
                <button type="submit"
                        class="bg-swamp-500 text-white px-8 py-3 rounded-full font-semibold hover:bg-swamp-600 transition-colors flex items-center justify-center space-x-2 mx-auto shadow-lg hover:shadow-swamp-200/50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <span>Send Message</span>
                </button>
            </div>
        </form>
    </div>
</section>

<!-- Success Modal (Reuse your existing popup component) -->
<div id="contactSuccess"
     class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[100]">
    <div class="bg-white rounded-xl max-w-md w-full p-6 relative shadow-lg">
        <div class="text-center">
            <div class="mx-auto w-24 h-24 bg-swamp-100 rounded-full flex items-center justify-center mb-4">
                <img src="green-toad-wink.svg" alt="The toad approves" class=" w-16 h-16">
            </div>
            <h3 class="text-xl font-bold text-swamp-900 mb-2">Message Sent!</h3>
            <p class="text-swamp-700">
                We'll hop to it! Expect a response within 24-48 hours.
            </p>
            <button onclick="closeContactSuccess()"
                    class="mt-6 bg-swamp-500 text-white px-6 py-2 rounded-full hover:bg-swamp-600 transition-colors">
                Ribbitastic!
            </button>
        </div>
    </div>
</div>

<script>
    // Modal helpers and AJAX submit — intercept form and show messages on-page
    function showContactSuccess() {
        const modal = document.getElementById('contactSuccess');
        modal.classList.remove('hidden');
        modal.setAttribute('aria-hidden', 'false');
    }

    function closeContactSuccess() {
        const modal = document.getElementById('contactSuccess');
        modal.classList.add('hidden');
        modal.setAttribute('aria-hidden', 'true');
    }

    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('contactForm');
        let messageBox = document.getElementById('contact-message');
        if (!messageBox) {
            messageBox = document.createElement('div');
            messageBox.id = 'contact-message';
            messageBox.className = 'mt-2 text-sm';
            messageBox.setAttribute('aria-live', 'polite');
            form.insertAdjacentElement('beforebegin', messageBox);
        }

        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                messageBox.textContent = 'Sending...';
                messageBox.style.color = '';

                const formData = new FormData(form);
                try {
                    // include CSRF token from form hidden field for AJAX POSTs
                    const token = formData.get('gorilla.csrf.Token') || document.querySelector('input[name="gorilla.csrf.Token"]')?.value;
                    const headers = token ? { 'X-CSRF-Token': token } : {};
                    const resp = await fetch(form.action || '/api/contact', {
                        method: 'POST',
                        headers,
                        body: formData,
                    });
                    const data = await resp.json().catch(() => ({}));
                    if (resp.ok && data.status === 'ok') {
                        messageBox.textContent = data.message || 'Message sent!';
                        messageBox.style.color = 'green';
                        form.reset();
                        showContactSuccess();
                    } else {
                        messageBox.textContent = data.message || 'Failed to send message.';
                        messageBox.style.color = 'red';
                    }
                } catch (err) {
                    messageBox.textContent = 'Network error. Please try again.';
                    messageBox.style.color = 'red';
                }
            });
        }

        // Close modal when clicking outside
        const contactOverlay = document.getElementById('contactSuccess');
        if (contactOverlay) {
            contactOverlay.addEventListener('click', (e) => {
                if (e.target === contactOverlay) {
                    closeContactSuccess();
                }
            });
        }
    });
</script>

{{template "footer" .}}
</body>
</html>
